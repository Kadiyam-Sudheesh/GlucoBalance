{% extends "base.html" %}

{% block content %}
<div class="gb-main">
    <div class="gb-container" style="max-width: 600px;">
        <h1 style="margin-top: 2rem; color: #0f172a;">Edit Medication</h1>
        <p style="color: #4b5563; margin-bottom: 2rem;">Update details for {{ medication.name }}</p>

        <div class="gb-card">
            <form action="{{ url_for('edit_medication', med_id=medication.id) }}" method="POST">
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="name" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Medication
                        Name</label>
                    <input type="text" id="name" name="name" required value="{{ medication.name }}"
                        style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;">
                </div>

                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="dosage" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Dosage</label>
                    <input type="text" id="dosage" name="dosage" required value="{{ medication.dosage }}"
                        style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;">
                </div>

                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="frequency"
                        style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Frequency</label>
                    <select id="frequency" name="frequency"
                        style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;">
                        <option value="Once Daily" {% if medication.frequency=='Once Daily' %}selected{% endif %}>Once
                            Daily</option>
                        <option value="Twice Daily" {% if medication.frequency=='Twice Daily' %}selected{% endif %}>
                            Twice Daily (Morning & Night)</option>
                        <option value="Three Times Daily" {% if medication.frequency=='Three Times Daily' %}selected{%
                            endif %}>Three Times Daily</option>
                        <option value="Before Meals" {% if medication.frequency=='Before Meals' %}selected{% endif %}>
                            Before Meals</option>
                        <option value="Before Bed" {% if medication.frequency=='Before Bed' %}selected{% endif %}>Before
                            Bed</option>
                        <option value="As Needed" {% if medication.frequency=='As Needed' %}selected{% endif %}>As
                            Needed</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="notes" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Notes
                        (Optional)</label>
                    <textarea id="notes" name="notes"
                        style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; resize: vertical;">{{ medication.notes or '' }}</textarea>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="gb-btn-primary"
                        style="flex: 1; padding: 0.75rem; border: none; border-radius: 0.5rem; background-color: #3b82f6; color: white; cursor: pointer; font-weight: 600;">
                        Save Changes
                    </button>
                    <a href="{{ url_for('medications') }}"
                        style="flex: 1; padding: 0.75rem; text-align: center; border: 1px solid #e2e8f0; border-radius: 0.5rem; color: #4b5563; text-decoration: none; font-weight: 600; background: white;">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
