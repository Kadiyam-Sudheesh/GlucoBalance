{% extends "base.html" %}

{% block title %}Edit Contact{% endblock %}

{% block content %}
<div class="gb-main">
    <div class="gb-container" style="max-width: 600px;">
        <h1 style="margin-top: 2rem; color: #0f172a;">Edit Contact</h1>
        <p style="color: #4b5563; margin-bottom: 2rem;">Update details for your emergency contact.</p>

        <div class="gb-card">
            <form action="{{ url_for('edit_contact', contact_id=contact.id) }}" method="POST">
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="name" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Name</label>
                    <input type="text" id="name" name="name" required value="{{ contact.name }}"
                        style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;">
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="phone" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Phone
                        Number</label>
                    <input type="tel" id="phone" name="phone" required value="{{ contact.phone }}"
                        style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;">
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="gb-btn-primary"
                        style="flex: 1; padding: 0.75rem; border: none; border-radius: 0.5rem; background-color: #3b82f6; color: white; cursor: pointer; font-weight: 600;">
                        Save Changes
                    </button>
                    <a href="{{ url_for('manage_contacts') }}"
                        style="flex: 1; padding: 0.75rem; text-align: center; border: 1px solid #e2e8f0; border-radius: 0.5rem; color: #4b5563; text-decoration: none; font-weight: 600; background: white;">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
